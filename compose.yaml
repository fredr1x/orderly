  user-service-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: orderly-users
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5500:5432"
    volumes:
      - users_volume:/var/lib/postgresql/data
    networks:
      - orderly-net

  user-service:
    build:
      context: .
      dockerfile: user-service/Dockerfile
    ports:
      - "8082:8082"
    env_file:
      - .env.user-service
    depends_on:
      - keycloak
      - eureka-server
      - user-service-db
      - redis
    networks:
      - orderly-net

