  payment-service-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: orderly-payments
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5504:5432"
    volumes:
      - payments_volume:/var/lib/postgresql/data
    networks:
      - orderly-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d orderly-payments" ]
      interval: 5s
      timeout: 5s
      retries: 10

  payment-service-liquibase:
    image: liquibase/liquibase:4.25
    restart: "no"
    depends_on:
      payment-service-db:
        condition: service_healthy
    volumes:
      - ./payment-service/src/main/resources/db/changelog:/liquibase/changelog
    command: update
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://payment-service-db:5432/orderly-payments
      LIQUIBASE_COMMAND_USERNAME: postgres
      LIQUIBASE_COMMAND_PASSWORD: postgres
      LIQUIBASE_COMMAND_CHANGELOG_FILE: changelog/db.changelog-master.yaml
    networks:
      - orderly-net

  payment-service:
    build:
      context: .
      dockerfile: payment-service/Dockerfile
    environment:
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    ports:
      - "8086:8086"
    depends_on:
      payment-service-liquibase:
        condition: service_completed_successfully
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_started
#      redis:
#        condition: service_healthy
      kafka:
        condition: service_started
    networks:
      - orderly-net

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@localhost:9093'
      KAFKA_LISTENERS: 'PLAINTEXT://:9092,CONTROLLER://:9093,PLAINTEXT_HOST://0.0.0.0:29092'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    networks:
      - orderly-net

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8087:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    networks:
      - orderly-net

volumes:
  minio_volume:
  users_volume:
  geo_volume:
  keycloak_data:
  orders-volume:
  restaurants_volume:
  payments_volume:

networks:
  orderly-net:
    driver: bridge
