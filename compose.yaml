services:
  keycloak:
    image: quay.io/keycloak/keycloak:24.0.5
    command: start-dev
    ports:
      - "8081:8080"
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: admin
    volumes:
      - keycloak_data:/opt/keycloak/data/
    networks:
      - orderly-net

