  restaurant-service-db:
    image: postgis/postgis:16-3.4
    environment:
      POSTGRES_DB: orderly-restaurants
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5503:5432"
    volumes:
      - restaurants_volume:/var/lib/postgresql/data
    networks:
      - orderly-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres -d orderly-restaurants" ]
      interval: 5s
      timeout: 5s
      retries: 10

  restaurant-service-liquibase:
    image: liquibase/liquibase:4.25
    restart: "no"
    depends_on:
      restaurant-service-db:
        condition: service_healthy
    volumes:
      - ./restaurant-service/src/main/resources/db/changelog:/liquibase/changelog
    command: update
    environment:
      LIQUIBASE_COMMAND_URL: jdbc:postgresql://restaurant-service-db:5432/orderly-restaurants
      LIQUIBASE_COMMAND_USERNAME: postgres
      LIQUIBASE_COMMAND_PASSWORD: postgres
      LIQUIBASE_COMMAND_CHANGELOG_FILE: changelog/db.changelog-master.yaml
    networks:
      - orderly-net

  restaurant-service:
    build:
      context: .
      dockerfile: restaurant-service/Dockerfile
    env_file:
      - .env.restaurant-service
    ports:
      - "8085:8085"
    depends_on:
      restaurant-service-liquibase:
        condition: service_completed_successfully
      eureka-server:
        condition: service_healthy
      keycloak:
        condition: service_started
      redis:
        condition: service_healthy
    networks:
      - orderly-net

volumes:
  users_volume:
  geo_volume:
  keycloak_data:
  orders-volume:
  restaurants_volume:

networks:
  orderly-net:
    driver: bridge
